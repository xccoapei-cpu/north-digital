<!DOCTYPE html>

<head>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    .wrap {
      max-width: 900px;
      margin: auto;

      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: bold;
      font-size: 18px;

      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: left;
    }

    .card h3 {

    }
